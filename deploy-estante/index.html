    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #ffffff;
            overflow: hidden;
        }
        .serif {
            font-family: 'Playfair Display', serif;
        }
        .sidebar-item {
            transition: all 0.3s ease;
            position: relative;
        }
        .sidebar-item.active {
            color: #ffffff;
            font-weight: 600;
        }
        .sidebar-item.active::before {
            content: '';
            position: absolute;
            left: -24px;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 16px;
            background-color: #ffffff;
            border-radius: 0 4px 4px 0;
        }
        .cover-card {
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .cover-card:hover {
            transform: scale(1.02);
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #1a1a1a;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #252525;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeInUp 0.5s ease-out forwards;
        }
    </style>
</head>

        function switchCategory(cat) {
            // Update Menu
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
            const activeMenu = document.getElementById(`menu-${cat}`);
            if (activeMenu) activeMenu.classList.add('active');

            // Update Content
            const data = library[cat];
            document.getElementById('category-title').innerText = `${data.title} (${data.items.length} variantes)`;
            document.getElementById('main-heading').innerHTML = data.heading;
            document.getElementById('main-subheading').innerText = data.description;

            const container = document.getElementById('grid-container');
            container.innerHTML = '';

            data.items.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'group animate-fade-in';
                div.style.animationDelay = `${index * 0.03}s`;
                div.innerHTML = `
                    <div class="relative aspect-[4/5] overflow-hidden bg-neutral-900 rounded-xl cover-card border border-neutral-800/50">
                        <img 
                            src="${item.url}" 
                            alt="${item.name}" 
                            class="w-full h-full object-contain bg-neutral-900 group-hover:scale-105 transition-transform duration-700"
                            loading="lazy"
                        >
                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-6">
                            <span class="text-[10px] tracking-widest uppercase text-neutral-400 mb-1 block">Variante ID #${item.id}</span>
                            <h3 class="serif text-xl leading-tight">${item.name}</h3>
                        </div>
                    </div>
                    <div class="mt-4 px-2">
                         <h4 class="text-[10px] font-medium text-neutral-500 uppercase tracking-widest">${item.name}</h4>
                    </div>
                `;
                container.appendChild(div);
            });

            // Scroll to top of content
            document.querySelector('main').scrollTop = 0;
        }

        // Initialize with Capas
        switchCategory('capas');

        // Back to top functionality
        const mainEl = document.querySelector('main');
        const backToTopBtn = document.getElementById('back-to-top');

        mainEl.addEventListener('scroll', () => {
            if (mainEl.scrollTop > 300) {
                backToTopBtn.classList.remove('opacity-0', 'pointer-events-none');
                backToTopBtn.classList.add('opacity-100', 'pointer-events-auto');
            } else {
                backToTopBtn.classList.add('opacity-0', 'pointer-events-none');
                backToTopBtn.classList.remove('opacity-100', 'pointer-events-auto');
            }
        });

        function scrollToTop() {
            mainEl.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
